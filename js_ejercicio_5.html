<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background-color: #f4f4f4;
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 24px;
            border: 1px solid #dcdcdc;
        }

        input,
        button {
            font: inherit;
            padding: 8px;
            margin-top: 8px;
        }

        #calculator-result {
            margin-top: 16px;
            font-weight: bold;
        }

        a {
            color: #0b57d0;
        }
    </style>
</head>
<body>
    <main>
        <p><a href="index.html">Volver al indice</a></p>
        <h1>5. Calculadora Sencilla</h1>
        <div>
            <input type="number" id="first-number" placeholder="Primer numero">
        </div>
        <div>
            <input type="number" id="second-number" placeholder="Segundo numero">
        </div>
        <div>
            <button data-operation="sum">Sumar</button>
            <button data-operation="subtract">Restar</button>
            <button data-operation="multiply">Multiplicar</button>
            <button data-operation="divide">Dividir</button>
        </div>
        <p id="calculator-result">Resultado:</p>
    </main>

    <script src="js_ejercicio5.js"></script>
</body>
</html>
